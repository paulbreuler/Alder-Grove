name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  pr-title:
    name: PR Title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Validate conventional commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|refactor|test|docs|chore|ci|perf|style|build|revert)(\(.+\))?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "::error::PR title must follow conventional commits: type(scope): description"
            echo ""
            echo "Valid types: feat, fix, refactor, test, docs, chore, ci, perf, style, build, revert"
            echo "Examples:"
            echo "  feat(personas): add create persona form"
            echo "  fix: resolve null pointer in session cleanup"
            echo "  chore: bump vite to 8.0.0"
            echo ""
            echo "Got: $PR_TITLE"
            exit 1
          fi
          echo "PR title is valid: $PR_TITLE"

  ai-configs:
    name: AI Config Freshness
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify generated assistant configs
        run: pnpm ai:check

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --workspace

      - name: Test
        run: cargo test --workspace

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Format check
        run: cargo fmt --all -- --check

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: |
          if find src -name '*.ts' -o -name '*.tsx' 2>/dev/null | grep -q .; then
            pnpm check
          else
            echo "No TypeScript source files yet — skipping"
          fi

      - name: Test
        run: |
          if find src -name '*.test.ts' -o -name '*.test.tsx' 2>/dev/null | grep -q .; then
            pnpm test
          else
            echo "No test files yet — skipping"
          fi
